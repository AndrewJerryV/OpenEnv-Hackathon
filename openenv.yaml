spec_version: 1
name: agentic-orchestrator
version: 1.0
entrypoint: inference.py

environment:
  docker:
    build: .

tasks:
  - id: payment_failure
    name: payment_failure
    description: Resolve payment gateway issue
    max_steps: 8
    grader:
      type: log_score
      metric: score
      source: "[END]"

  - id: deployment_crash
    name: deployment_crash
    description: Fix deployment crash issue
    max_steps: 8
    grader:
      type: log_score
      metric: score
      source: "[END]"

  - id: customer_complaint
    name: customer_complaint
    description: Handle customer complaint issue
    max_steps: 8
    grader:
      type: log_score
      metric: score
      source: "[END]"

  - id: latency_spike
    name: latency_spike
    description: Resolve intermittent latency spikes
    max_steps: 8
    grader:
      type: log_score
      metric: score
      source: "[END]"