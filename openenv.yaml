spec_version: 1
name: agentic-orchestrator
version: 1.0
entrypoint: inference.py

environment:
  docker:
    build: .

tasks:
  - id: payment_failure
    name: "Payment Gateway Failure (Easy)"
    difficulty: easy
    max_steps: 6
    grader:
      type: log
      metric: score
      regex: "score=([0-9.]+)"

  - id: deployment_crash
    name: "Deployment Crash Loop (Medium)"
    difficulty: medium
    max_steps: 8
    grader:
      type: log
      metric: score
      regex: "score=([0-9.]+)"

  - id: customer_complaint
    name: "Complex Customer Complaint (Hard)"
    difficulty: hard
    max_steps: 10
    grader:
      type: log
      metric: score
      regex: "score=([0-9.]+)"

  - id: latency_spike
    name: "Intermittent Latency Spike (Hard)"
    difficulty: hard
    max_steps: 12
    grader:
      type: log
      metric: score
      regex: "score=([0-9.]+)"