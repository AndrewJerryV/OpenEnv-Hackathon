name: agentic-orchestrator
version: 1.0
entrypoint: inference.py

environment:
  docker:
    build: .

tasks:
  - name: payment_failure
    description: Resolve payment gateway issue
    max_steps: 6
    grader: true

  - name: deployment_crash
    description: Fix deployment crash issue
    max_steps: 6
    grader: true

  - name: customer_complaint
    description: Handle customer complaint issue
    max_steps: 6
    grader: true