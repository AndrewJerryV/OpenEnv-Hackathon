version: "1.0"

environment:
  name: agentic-orchestrator
  entry_point: app.py
  action_cls: Action
  observation_cls: Observation

tasks:
  - name: payment_failure
    description: >
      Resolve a live payment gateway latency spike. Search logs to identify
      the root cause, apply the correct mitigation action, and notify the
      appropriate team via Slack before closing the incident.
    max_steps: 6
    grader:
      type: threshold
      metric: score
      threshold: 0.60
      aggregation: last

  - name: deployment_crash
    description: >
      Diagnose and recover from a pod crash-loop during a deployment sync.
      Search logs to confirm the root cause, execute the correct rollback or
      restart command, notify the devops team, and finish the task.
    max_steps: 8
    grader:
      type: threshold
      metric: score
      threshold: 0.60
      aggregation: last

  - name: customer_complaint
    description: >
      Investigate and resolve a customer-reported login failure returning
      HTTP 500 on the auth endpoint. Identify the root cause via log search,
      apply the correct CRM update or cache flush, notify the right channel,
      and close the incident.
    max_steps: 10
    grader:
      type: threshold
      metric: score
      threshold: 0.60
      aggregation: last

  - name: latency_spike
    description: >
      Triage a P99 latency spike on api-gateway-v2 that has breached 2500 ms.
      Search logs to confirm the root cause, execute the appropriate scaling
      or optimisation command, notify the devops team, and finish the task.
    max_steps: 12
    grader:
      type: threshold
      metric: score
      threshold: 0.60
      aggregation: last