spec_version: 1
name: agentic-orchestrator
version: 1.0
entrypoint: inference.py

environment:
  docker:
    build: .

tasks:
  - id: payment_failure
    name: "Payment Gateway Resolution (Easy)"
    difficulty: easy
    max_steps: 6
    graders:
      - type: agent
        metric: reward
        source: "[END]"
        regex: "score=([0-9.]+)"

  - id: deployment_crash
    name: "Deployment Crash Recovery (Medium)"
    difficulty: medium
    max_steps: 8
    graders:
      - type: agent
        metric: reward
        source: "[END]"
        regex: "score=([0-9.]+)"

  - id: customer_complaint
    name: "Complex Customer Orchestration (Hard)"
    difficulty: hard
    max_steps: 12
    graders:
      - type: agent
        metric: reward
        source: "[END]"
        regex: "score=([0-9.]+)"